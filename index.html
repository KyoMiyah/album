<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Album</title>
</head>
<body>

<!-- ページ1 -->
<div id="page1">
    <h1>なっちゃんへ</h1>
    <p>いつもありがとう。</p>

    <button onclick="showPage(2)">
        次へ
    </button>
</div>

<!-- ページ2 -->
<div id="page2" style="display:none">
    <img src="images/photo1.jpg" width="500">

    <br><br>

    <button onclick="showPage(1)">戻る</button>
    <button onclick="showPage(3)">次へ</button>
</div>

<!-- ページ3 -->
<div id="page3" style="display:none">
    <img src="images/photo2.jpg" width="500">

    <br><br>

    <button onclick="showPage(2)">戻る</button>
    <button onclick="showPage(4)">次へ</button>
</div>

<!-- ページ4 -->
<div id="page4" style="display:none">
    <img src="images/photo3.jpg" width="500">

    <br><br>

    <button onclick="showPage(3)">戻る</button>
</div>

<script>

function showPage(pageNumber){

    for(let i=1;i<=4;i++){
        document.getElementById("page"+i).style.display="none";
    }

    document.getElementById("page"+pageNumber).style.display="block";
}

</script>

</body>
</html>
